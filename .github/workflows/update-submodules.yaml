name: Update Submodules

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-submodules:
    name: Update submodules
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Update submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --remote

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "ci: update submodules"
          title: "ci: update submodules"
          body: |
            ## Summary
            - update git submodules to their latest upstream commits

            This pull request was generated automatically.
          branch: ci/update-submodules
          delete-branch: true
